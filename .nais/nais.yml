apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: tiltakspenger-meldekort-api
  namespace: tpts
  labels:
    team: tpts
spec:
  image: {{ image }}
  port: 8080
  azure:
    application:
      enabled: true
  replicas:
    min: 1
    max: 1
  liveness:
    path: /isalive
  readiness:
    path: /isready
  prometheus:
    enabled: true
    path: /metrics
  secureLogs:
    enabled: true
  tokenx:
    enabled: true
  leaderElection: true
  gcp:
    sqlInstances:
      - name: tiltakspenger-meldekort
        type: POSTGRES_15
        diskAutoresize: {{ sqlInstances.diskAutoresize }}
        pointInTimeRecovery: {{ sqlInstances.pointInTimeRecovery }}
        databases:
          - name: meldekort
            envVarPrefix: DB
  accessPolicy:
    outbound:
      rules:
        - application: tiltakspenger-utbetaling
        - application: tiltakspenger-dokument
    inbound:
      rules:
        - application: tiltakspenger-vedtak-rivers
          namespace: tpts
          cluster: {{ cluster }}
        - application: tiltakspenger-saksbehandler
          namespace: tpts
          cluster: {{ cluster }}
  env:
  {{#each azure.groups}}
     - name: {{this.name}}
  value: {{this.id}}
  {{/each}}
